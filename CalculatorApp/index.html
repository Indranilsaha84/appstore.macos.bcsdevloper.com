<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator App</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f3f3f3;
    }
    .calculator {
      background: #222;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      width: 260px;
    }
    .display {
      background: #333;
      color: white;
      text-align: right;
      padding: 20px;
      font-size: 40px;
      border-radius: 8px;
      margin-bottom: 20px;
      min-height: 48px;
      word-wrap: break-word;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    button {
      border: none;
      border-radius: 50%;
      width: 55px;
      height: 55px;
      font-size: 20px;
      cursor: pointer;
      color: white;
      font-weight: bold;
      transition: filter 0.2s;
    }
    button:hover {
      filter: brightness(1.2);
    }
    .num { background: #555; }
    .op { background: #FF9500; font-size: 24px; }
    .func { background: #A5A5A5; color: black; }
    .zero {
      grid-column: span 2;
      width: 100%;
      border-radius: 30px;
      text-align: left;
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display" id="display">0</div>
    <div class="grid">
      <button class="func" onclick="clearDisplay()">AC</button>
      <button class="func" onclick="appendOperator('%')">%</button>
      <button class="func" onclick="appendOperator('/')">/</button>
      <button class="op" onclick="appendOperator('*')">×</button>
      
      <button class="num" onclick="appendNumber(7)">7</button>
      <button class="num" onclick="appendNumber(8)">8</button>
      <button class="num" onclick="appendNumber(9)">9</button>
      <button class="op" onclick="appendOperator('-')">-</button>
      
      <button class="num" onclick="appendNumber(4)">4</button>
      <button class="num" onclick="appendNumber(5)">5</button>
      <button class="num" onclick="appendNumber(6)">6</button>
      <button class="op" onclick="appendOperator('+')">+</button>
      
      <button class="num" onclick="appendNumber(1)">1</button>
      <button class="num" onclick="appendNumber(2)">2</button>
      <button class="num" onclick="appendNumber(3)">3</button>
      <button class="op" onclick="calculate()" style="grid-row: span 2; height: 100%; border-radius: 30px;">=</button>
      
      <button class="num zero" onclick="appendNumber(0)">0</button>
      <button class="num" onclick="appendNumber('.')">.</button>
    </div>
  </div>

  <script>
    let display = document.getElementById('display');
    let currentInput = '0';

    function updateDisplay() {
      display.innerText = currentInput;
    }

    function appendNumber(num) {
      if (currentInput === '0' && num !== '.') {
        currentInput = num.toString();
      } else {
        currentInput += num.toString();
      }
      updateDisplay();
    }

    function appendOperator(op) {
      const lastChar = currentInput.slice(-1);
      if (['+', '-', '*', '/', '%'].includes(lastChar)) {
        currentInput = currentInput.slice(0, -1) + op;
      } else {
        currentInput += op;
      }
      updateDisplay();
    }

    function clearDisplay() {
      currentInput = '0';
      updateDisplay();
    }

    function calculate() {
      try {
        currentInput = eval(currentInput).toString();
      } catch (e) {
        currentInput = 'Error';
      }
      updateDisplay();
    }
  </script>
</body>
</html>
